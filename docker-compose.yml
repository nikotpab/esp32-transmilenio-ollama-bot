version: '3.8'

services:
  telegram_bot:
    build: .
    container_name: transmilenio_bot
    restart: unless-stopped
    env_file:
      - .env
    # host.docker.internal allows Docker to connect to Ollama running on the host Mac natively
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
