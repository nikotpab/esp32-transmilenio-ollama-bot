[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino

monitor_speed = 115200
upload_speed = 921600

lib_deps =
    bblanchon/ArduinoJson@^7.0.4
    waxmoon/UniversalTelegramBot@^1.3.0
    arduino-libraries/NTPClient@^3.2.1

board_build.partitions = min_spiffs.csv
board_build.f_cpu = 240000000L
board_build.stack_size = 8192

build_flags =
    -Os
    -DBOARD_HAS_PSRAM
    -D CONFIG_ARDUINO_LOOP_STACK_SIZE=8192
    -D CORE_DEBUG_LEVEL=3

[env:esp32wrover]
extends = env:esp32dev
board = esp32wrover
build_flags =
    ${env:esp32dev.build_flags}
    -D BOARD_HAS_PSRAM

[env:esp32s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
upload_speed = 921600
lib_deps =
    bblanchon/ArduinoJson@^7.0.4
    waxmoon/UniversalTelegramBot@^1.3.0
    arduino-libraries/NTPClient@^3.2.1
build_flags =
    -D BOARD_HAS_PSRAM
    -Os
